<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="keywords" content="xo game, XO Game, x o game, X O Game, XO game">
</head>
<body>
    <div class="cotainer">
        <div class="details">
            <p>Styles</p>
            <ul>
                <li onclick="Default()">Default Mood</li>
                <li onclick="blue()">Blue Style</li>
                <li onclick="red()">Red Style</li>
                <li onclick="yellow()">Yellow Style</li>
            </ul>
        </div>
        <div id="parent" class="cell1">
            <div class="parentOfTitle">
                <div class="title">X O <span id="span">Game</span></div>
            </div>
            <div class="row1" id="row">
                <div id="item1" class="item"></div>
                <div id="item2" class="item"></div>
                <div id="item3" class="item"></div>
            </div>

            <div class="row2" id="row">
                <div id="item4" class="item"></div>
                <div id="item5" class="item"></div>
                <div id="item6" class="item"></div>
            </div>

            <div class="row3" id="row">
                <div id="item7" class="item"></div>
                <div id="item8" class="item"></div>
                <div id="item9" class="item"></div>
            </div>
        </div>
        <div class="parentOfBtns">
            <div class="Xscore"></div>
            <div class="Oscore"></div>
            <button class="change">Single Mood</button>
            <button class="with">Group Mood</button>
        </div>
    </div>

    <style>
        *{
            font-family: sans-serif;
            margin: 2px;
            padding: 0;
        }
        .cotainer{
            display: flex;
        }
        p{margin: 5px;}
        .details{
            height: 30px;
            background-color: rgb(0, 0, 0);
            color: white;
            overflow: hidden;
            border: solid .5px white;
        }
        .item{
            background-color: black;
            color: rgb(0, 255, 8);
            font-family: sans-serif;
            font-size: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 25vmin;
            width: 25vmin;
            box-shadow: 0px 0px 0px 3px rgb(0, 255, 64) inset;
            cursor: pointer;
        }
        .item:hover{
            transform: scale(1.05);
        }
        #row{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        body{
            background: rgb(0, 0, 0);
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .title{
            width: 200px;
            height: 50px;
            background: black;
            box-shadow: 0px 0px 2px 2.5px rgb(0, 255, 64) inset;
            color: rgb(0, 255, 64);
            font-size: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .parentOfTitle{
            display: flex;
            justify-content: center;
        }
        .change{
            width: 200px;
            height: 50px;
            background: black;
            box-shadow: 0px 0px 2px 2.5px rgb(0, 255, 64) inset;
            color: rgb(0, 255, 64);
            font-size: 30px;
            border: none;
            padding: 10px;
            transition: width .2s;
        }
        button:hover{
            cursor: pointer;
            background-color: rgb(45, 45, 45);
        }
        span{
            color: blue;
        }
        .with{
            width: 200px;
            height: 50px;
            background: black;
            box-shadow: 0px 0px 2px 2.5px rgb(0, 255, 64) inset;
            color: rgb(0, 255, 64);
            font-size: 30px;
            border: none;
            padding: 10px;
            transition: width .2s;
        }
        #with:hover{
            background-color: rgb(45, 45, 45);
        }

        .parentOfBtns{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        @media (min-width: 200px) and (max-width: 500px) {
            .cotainer{
                flex-direction: column;
            }
            .details{
                position: absolute;
                top: 85%;
                left: 30%;
            }
        }

        .Xscore, .Oscore{
            width: 200px;
            height: 50px;
            color: aliceblue;
            background-color: black;
            box-shadow: 0px 0px 0px .5px white inset;
            font-size: 40px;
        }
        .Oscore::before{
            content:"O: ";
        }
        .Xscore:before{
            content:"X: ";
        }

        li:hover{
            background: gray;
            cursor: pointer;
        }
        .details:hover{
            cursor: pointer;
        }

    </style>

    <script src="learn.js"></script>

    
</body>
</html>
